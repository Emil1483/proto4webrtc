# Dev/test template: generate TypeScript from the example protos using the
# in-repo plugin. Run from the repo root:
#
#   buf generate --template example/buf.gen.yaml
#
# (Published consumers use `local: protoc-gen-proto4webrtc-ts` from their
# node_modules instead of the node invocation below.)
version: v2
clean: true
plugins:
  - local: ts/node_modules/.bin/protoc-gen-es
    out: example/gen-ts
    opt:
      - target=ts
  - local: ["node", "ts/bin/protoc-gen-proto4webrtc-ts.mjs"]
    out: example/gen-ts
    strategy: all
